services:
  crypto-office-aml-api:
    build:
      context: .
    container_name: crypto-office-aml-api
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - n8n_default
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||8000)+'/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true

networks:
  n8n_default:
    external: true
